name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Compile check
        run: python -m py_compile evaluate.py calibrate.py dashboard.py

      - name: Security audit
        run: bash scripts/audit.sh

      - name: Dry run validation
        run: uv run evaluate.py --dry-run

      - name: Tests
        run: uv run pytest tests/ -v
