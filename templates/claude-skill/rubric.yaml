eval_mode: binary
max_iterations: 7
cross_doc_weight: 0.0

artifact: example-skill.md

context: >
  A Claude Code skill definition (SKILL.md) for an AI coding assistant.
  The skill should trigger correctly, have clear instructions, handle errors,
  decompose complex tasks, and scope capabilities minimally.

dimensions:
  trigger_accuracy:
    description: >
      Does the description field correctly identify when to invoke this skill?
      Not too broad (fires on common words like "check" or "run"), not too
      narrow (misses valid use cases the skill was designed for). The trigger
      should activate on the specific intent, not on surface-level keyword
      overlap with unrelated requests.
    weight: 1.0

  instruction_completeness:
    description: >
      Does every step have enough detail for the agent to execute without
      guessing? No ambiguous phrases like "handle appropriately", "use your
      judgment", or "do the right thing." Each instruction should specify
      the exact tool call, file path pattern, or decision criteria the agent
      needs. If a step requires information from a previous step, the
      dependency must be explicit.
    weight: 1.0

  error_handling:
    description: >
      Does the skill handle failures, edge cases, and unexpected input?
      Are there explicit instructions for what to do when tools fail,
      return unexpected results, or when preconditions are not met?
      The skill should never leave the agent in a state where it has no
      instruction for what to do next.
    weight: 1.0

  task_decomposition:
    description: >
      For multi-step workflows, are tasks broken into clear sequential or
      parallel steps? Are dependencies between steps explicit? If the skill
      launches subagents, are their prompts self-contained with all needed
      context (no references to "the current conversation" or "what we
      discussed earlier")? Each step should have a clear completion
      criterion.
    weight: 1.0

  capability_scoping:
    description: >
      Are allowed-tools minimally scoped? Does the skill request only the
      permissions it actually needs? A skill that only reads files should
      not have Write or Bash in its allowed-tools. A skill that only
      searches should not have Edit. Over-permissioning creates risk of
      unintended side effects.
    weight: 1.0
