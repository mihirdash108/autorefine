# autorefine rubric — example configuration
# This file defines how your artifacts are evaluated.
# The refiner agent CANNOT modify this file.
#
# Two evaluation modes:
#   binary (default, recommended): pass/fail per dimension
#   scale: 1-5 score per dimension
#
# See README.md for rubric design best practices.

eval_mode: binary      # "binary" (recommended) or "scale"
scale_range: 5         # 1-N scale (only used in scale mode; research shows 5 is optimal)
judge_model: gpt-4o    # Override with AUTOREFINE_MODEL env var
cross_doc_weight: 0.0  # Weight of cross-document consistency (0 to disable for single artifact)
max_iterations: 10     # Stop after this many iterations (convergence may stop earlier)

# Mock values for placeholders — the judge sees these instead of {PLACEHOLDER}
# Prevents unfair penalization for template variables not yet filled
placeholder_mocks: {}
  # Example:
  # METRIC_A: "0.94"
  # METRIC_B: "1270"

# ---------------------------------------------------------------------------
# Artifact evaluation dimensions
# ---------------------------------------------------------------------------
# This example evaluates a sample product page (artifacts/example.md).
# Replace with your own artifact and dimensions, or use a template:
#   cp templates/llm-skill/rubric.yaml .

artifacts:
  example.md:
    weight: 1.0
    context: >
      A product landing page for CloudSync, a file synchronization tool
      for teams. Target audience: IT decision-makers at mid-size companies
      evaluating sync solutions. They need specifics, not marketing fluff.

    dimensions:
      specificity:
        pass: >
          Every claim is backed by a concrete number, comparison, or specific
          example. "Fast" is replaced with "syncs 10GB in under 2 minutes."
          "Better than competitors" is replaced with specific feature gaps.
        fail: >
          Contains vague claims like "fast," "reliable," "great collaboration
          features," or "our customers love it" without supporting evidence.

      buyer_clarity:
        pass: >
          A reader understands within 30 seconds: what problem this solves,
          who it's for, and why existing solutions are insufficient. Leads
          with the buyer's pain, not the product's features.
        fail: >
          Opens with feature lists or generic statements. The reader cannot
          tell why they should care or what makes this different from Dropbox,
          Google Drive, or OneDrive without reading the entire page.

      evidence_quality:
        pass: >
          Claims are backed by benchmarks, customer counts, specific integrations
          named, compliance certifications with details. No unsupported superlatives.
        fail: >
          Uses phrases like "our customers love it," "we take security seriously,"
          or "popular tools" without naming specific customers, tools, or metrics.

      conciseness:
        pass: >
          Every sentence adds information. No boilerplate ("we take X seriously"),
          no redundancy, no filler sections. Removing any paragraph would lose
          substantive content.
        fail: >
          Contains boilerplate, filler, or sections that repeat information
          already stated elsewhere in the document.
